name: Build Smart Pantry APK ✓

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
    
    - name: Install Capacitor CLI
      run: npm i @capacitor/cli@latest
      
    - name: Verify webApp
      run: |
        ls -la webApp/
        test -f webApp/index.html && echo "✅ webApp ready" || echo "❌ No index.html in webApp!"
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Generate Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore \
          -storepass android -alias androiddebugkey -keypass android \
          -dname "CN=Android,C=US"
    
    - name: Build SIGNED APK
      run: |
        npx cap sync android --webDir webApp  # Explizit webApp!
        cd android
        chmod +x ./gradlew
        ./gradlew clean assembleDebug \
          -Pandroid.injected.signing.store.file=../debug.keystore \
          -Pandroid.injected.signing.store.password=android \
          -Pandroid.injected.signing.key.alias=androiddebugkey \
          -Pandroid.injected.signing.key.password=android
    
    - name: APK Info
      run: |
        cd android/app/build/outputs/apk/debug/
        ls -la app-debug.apk
        du -h app-debug.apk
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: smart-pantry-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
