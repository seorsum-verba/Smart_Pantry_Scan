name: Build SIGNED Debug APK (Mobile-only)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
      
    - name: Install dependencies
      run: npm ci
      
    - name: Build web assets
      run: |
        npm run build || npm run ionic:build || npm run build:prod || npm run ionic build || echo "Using src as fallback"
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
      
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Generate Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore \
          -storepass android -alias androiddebugkey -keypass android \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US"
      
    - name: Sync & Build Signed APK
      run: |
        npx cap sync android
        cd android
        chmod +x ./gradlew
        ./gradlew clean assembleDebug \
          -Pandroid.injected.signing.store.file=../debug.keystore \
          -Pandroid.injected.signing.store.password=android \
          -Pandroid.injected.signing.key.alias=androiddebugkey \
          -Pandroid.injected.signing.key.password=android
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: smart-pantry-signed-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
