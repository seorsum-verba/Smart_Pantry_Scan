name: Build Android APK (Debug) - FIXED

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
      
    - name: Install dependencies
      run: npm ci
      
    # BUILD WEB ASSETS ERST!
    - name: Build web app
      run: npm run build  # Oder 'npm run build:prod' falls vorhanden
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
      
    - name: Install Android SDK
      uses: android-actions/setup-android@v3
      
    # ALLE ASSETS KOPIEREN
    - name: Prepare Capacitor Android
      run: |
        npx cap sync android
        npx cap copy android
        npx cap open android  # Optional: Öffnet Android Studio (skip in CI)
        
    - name: Build Android Debug APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew clean  # Clean alte Builds
        ./gradlew assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: smart-pantry-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
