name: Smart Pantry APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Generate Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
    
    - name: Sync webApp & Build
      run: |
        npx cap sync android
        cd android
        chmod +x ./gradlew
        ./gradlew clean assembleDebug -Pandroid.injected.signing.store.file=../debug.keystore -Pandroid.injected.signing.store.password=android -Pandroid.injected.signing.key.alias=androiddebugkey -Pandroid.injected.signing.key.password=android
    
    - name: APK Details
      run: |
        cd android/app/build/outputs/apk/debug
        ls -lh app-debug.apk
        echo "Build complete!"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: smart-pantry-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
